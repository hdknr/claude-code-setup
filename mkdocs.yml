site_name: Claude Code 設定
site_description: Claude Code をインストールして使えるようにするための手順書
site_url: https://hdknr.github.io/claude-code-setup/

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え

nav:
  - ホーム: index.md
  - 概要: overview.md
  - macOS:
    - Part 1 - 事前準備: macos/part1-preparation.md
    - Part 2 - Claude Code インストール: macos/part2-installation.md
    - Part 3 - インストール後の環境準備: macos/part3-post-setup.md
  - Windows:
    - Part 1 - 事前準備: windows/part1-preparation.md
    - Part 2 - Claude Code インストール: windows/part2-installation.md
    - Part 3 - インストール後の環境準備: windows/part3-post-setup.md
  - Claude Codeの使い方:
    - 基本概念: usage/concepts.md
    - なぜ GitHub を使うのか: usage/why-github.md
    - 基本操作とスラッシュコマンド: usage/basic-operations.md
    - 実行モードと権限管理: usage/execution-modes.md
    - CLAUDE.md の使い方: usage/claude-md.md
    - スキル活用ガイド: usage/skills-guide.md
  - Claude Codeの高度な使い方:
    - 拡張機能: usage/advanced-extensions.md
    - トークン最適化: usage/advanced-token-management.md
  - 事例集:
    - 事例集について: cases/index.md
    - WordPress (xserver) を Claude Code で管理:
      - 全体像: cases/wp-xserver/index.md
      - 1. ゴールと全体フロー: cases/wp-xserver/01-overview.md
      - 2. フォルダ作成と plan.md: cases/wp-xserver/02-prepare-folder.md
      - 3. GitHub リポジトリの用意: cases/wp-xserver/03-github-repo.md
      - 4. plan.md から Issue を作る: cases/wp-xserver/04-issue-creation.md
      - 5. Issue で対話する: cases/wp-xserver/05-issue-dialogue.md
      - 6. Docker で stage 環境: cases/wp-xserver/06-stage-docker.md
      - 7. 修正と PR: cases/wp-xserver/07-edit-and-pr.md
      - 8. xserver にデプロイ: cases/wp-xserver/08-deploy-xserver.md
      - 9. トラブルシュート: cases/wp-xserver/09-troubleshooting.md
  - 付録 - 便利リンク集: appendix-links.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
